<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERS0NE PROTECTION - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #09090b; 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container {
            background: rgba(18, 18, 20, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 800; color: white; }
        .logo span { color: #6366f1; }
        .sub { color: #9ca3af; margin: 8px 0 30px; }
        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #6366f1; }
        .btn {
            background: #6366f1;
            color: white;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-outline {
            background: transparent;
            color: #9ca3af;
            padding: 10px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }
        .btn-outline:hover { color: white; }
        .error { color: #ef4444; font-size: 13px; margin-top: 8px; }
        .success { color: #10b981; font-size: 13px; margin-top: 8px; }
        .toggle-link { color: #6366f1; cursor: pointer; }
        .toggle-link:hover { text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KERS0NE<span>PROTECTION</span></div>
    <p class="sub" id="formTitle">Sign in to your account</p>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn" onclick="login()">Sign In</button>
        <button class="btn-outline" onclick="showRegister()">Don't have an account? <span class="toggle-link">Register</span></button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <input type="text" id="registerUsername" placeholder="Username">
        <input type="email" id="registerEmail" placeholder="Email address">
        <input type="password" id="registerPassword" placeholder="Password (min 6 characters)">
        <button class="btn" onclick="register()">Create Account</button>
        <button class="btn-outline" onclick="showLogin()">Already have an account? <span class="toggle-link">Sign In</span></button>
    </div>

    <div id="message" class="error"></div>
</div>

<script>
// ============================================================
// EMAIL AUTH (uses localStorage)
// ============================================================

function getUsers() {
    try { return JSON.parse(localStorage.getItem('kp_users') || '[]'); } 
    catch { return []; }
}

function saveUsers(users) {
    localStorage.setItem('kp_users', JSON.stringify(users));
}

function showLogin() {
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('formTitle').textContent = 'Sign in to your account';
    document.getElementById('message').textContent = '';
}

function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('formTitle').textContent = 'Create your account';
    document.getElementById('message').textContent = '';
}

function register() {
    const username = document.getElementById('registerUsername').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const msg = document.getElementById('message');

    if (!username) { msg.textContent = '❌ Enter a username.'; return; }
    if (!email) { msg.textContent = '❌ Enter an email.'; return; }
    if (password.length < 6) { msg.textContent = '❌ Password must be at least 6 characters.'; return; }

    let users = getUsers();
    if (users.find(u => u.email === email)) {
        msg.textContent = '❌ Email already registered.';
        return;
    }

    users.push({
        username: username,
        email: email,
        password: password,
        created: Date.now()
    });
    saveUsers(users);
    msg.className = 'success';
    msg.textContent = '✅ Account created! Please sign in.';
    showLogin();
    document.getElementById('loginEmail').value = email;
}

function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('message');

    if (!email || !password) {
        msg.textContent = '❌ Enter email and password.';
        return;
    }

    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        msg.textContent = '❌ Invalid email or password.';
        return;
    }

    // Login successful
    localStorage.setItem('kp_session', JSON.stringify({
        username: user.username,
        email: user.email,
        loggedIn: Date.now()
    }));
    window.location.href = '/dashboard.html';
}

// Check if already logged in
const session = localStorage.getItem('kp_session');
if (session) {
    try {
        const data = JSON.parse(session);
        if (data.loggedIn && Date.now() - data.loggedIn < 86400000 * 30) {
            window.location.href = '/dashboard.html';
        }
    } catch(e) {}
}
</script>
</body>
</html>
