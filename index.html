<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERS0NE PROTECTION | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        *{box-sizing:border-box}
        :root{--bg:#09090b;--card:rgba(18,18,20,0.65);--primary:#6366f1;--border:rgba(255,255,255,0.08);--text:#f8fafc;--muted:#9ca3af}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .glass{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:50px;max-width:420px;width:100%;text-align:center}
        .logo{font-size:28px;font-weight:800;color:white;margin-bottom:8px}
        .logo span{color:var(--primary)}
        .sub{color:var(--muted);margin-bottom:30px}
        .btn-discord{background:#5865F2;color:white;padding:14px;border-radius:12px;border:none;font-weight:600;font-size:16px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;transition:0.2s}
        .btn-discord:hover{background:#4752C4;transform:translateY(-2px)}
        .footer{margin-top:20px;font-size:13px;color:#6b7280}
        .footer a{color:var(--primary);text-decoration:none}
    </style>
</head>
<body>
<div class="glass">
    <div class="logo">KERS0NE<span>PROTECTION</span></div>
    <p class="sub">Secure your Lua scripts</p>
    
    <!-- THIS IS THE FIXED LOGIN BUTTON -->
    <a href="/auth/discord" class="btn-discord">
        <svg width="24" height="24" viewBox="0 0 127.14 96.36" fill="white">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        Login with Discord
    </a>
    
    <p class="footer"><a href="/terms">Terms & Privacy</a></p>
</div>

<script>
// Check if user is already logged in
const params = new URLSearchParams(window.location.search);
const user = params.get('user');
const id = params.get('id');
const avatar = params.get('avatar');

if (user && id) {
    localStorage.setItem('kp_user', user);
    localStorage.setItem('kp_id', id);
    localStorage.setItem('kp_avatar', avatar || '');
    window.location.href = '/dashboard';
}

// If user is stored, go to dashboard
if (localStorage.getItem('kp_user') && localStorage.getItem('kp_id')) {
    window.location.href = '/dashboard';
}
</script>
</body>
</html>
