<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KERS0NE PROTECTION - Logging in...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #09090b; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .loading { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading">
    <h2 style="color:#6366f1">KERS0NE PROTECTION</h2>
    <p style="color:#9ca3af">Authenticating...</p>
    <div class="spinner"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');

if (code) {
    localStorage.setItem('kp_user', 'Discord User');
    localStorage.setItem('kp_id', 'user_' + Math.random().toString(36).substring(2, 10));
    localStorage.setItem('kp_code', code);
    window.location.href = '/dashboard.html';
} else {
    window.location.href = '/';
}
</script>
</body>
</html>
