<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERS0NE PROTECTION - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #09090b; color: #f8fafc; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #6366f1; }
        .user { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.08); }
        .card { background: rgba(18, 18, 20, 0.65); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .btn { background: #6366f1; color: white; padding: 10px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }
        .btn-outline { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); color: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
        .loadstring-box { background: rgba(0,0,0,0.3); border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #6366f1; word-break: break-all; cursor: pointer; margin: 8px 0; }
        .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; display: inline-block; }
        .badge-active { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-disabled { background: rgba(239,68,68,0.15); color: #ef4444; }
        .nav { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .nav button { background: none; border: none; color: #9ca3af; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .nav button.active { background: rgba(99,102,241,0.15); color: #6366f1; }
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">KERS0NE<span>PROTECTION</span></div>
    <div class="user">
        <span id="username">User</span>
        <img id="avatar" class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
        <button onclick="logout()" class="btn-outline" style="padding:6px 14px;font-size:12px;">Logout</button>
    </div>
</div>

<div class="nav">
    <button class="active" onclick="switchView('view-scripts')">📜 Scripts</button>
    <button onclick="switchView('view-obfuscator')">🔮 Obfuscator</button>
    <button onclick="switchView('view-keys')">🔑 Keys</button>
    <button onclick="switchView('view-hwids')">🚫 HWID Bans</button>
</div>

<!-- VIEW: SCRIPTS -->
<div id="view-scripts" class="view active">
    <div class="card">
        <h3>Your Scripts</h3>
        <div id="scriptsList" class="grid"></div>
    </div>
    <button class="btn" onclick="switchView('view-obfuscator')">+ New Script</button>
</div>

<!-- VIEW: OBFUSCATOR -->
<div id="view-obfuscator" class="view">
    <div class="card">
        <h3>Obfuscate Script</h3>
        <input type="text" id="scriptName" placeholder="Script Name">
        <textarea id="scriptInput" rows="6" placeholder="-- Paste your Lua script here..."></textarea>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
                <input type="checkbox" id="ffaModeCheck"> FFA Mode
            </label>
        </div>
        <button class="btn" onclick="obfuscateScript()">🔮 Obfuscate</button>
        <div id="obfuscateStatus" style="margin-top:10px;font-size:13px;color:#9ca3af">Ready</div>
        <textarea id="scriptOutput" style="margin-top:12px;min-height:100px;font-family:monospace;font-size:12px" placeholder="Obfuscated output..." readonly></textarea>
    </div>
    <button class="btn-outline" onclick="switchView('view-scripts')">← Back</button>
</div>

<!-- VIEW: KEYS -->
<div id="view-keys" class="view">
    <div class="card">
        <h3>Generate Key</h3>
        <input type="number" id="keyDuration" placeholder="Hours (0 = permanent)">
        <input type="text" id="keyNote" placeholder="Note">
        <button class="btn" onclick="generateKey()">🎲 Generate</button>
    </div>
    <h3>Your Keys</h3>
    <div id="keysList" class="grid"></div>
</div>

<!-- VIEW: HWID BANS -->
<div id="view-hwids" class="view">
    <div class="card">
        <h3>Ban HWID</h3>
        <input type="text" id="banHwidInput" placeholder="HWID to ban">
        <button class="btn-danger" onclick="banHwid()">Ban</button>
    </div>
    <h3>Banned HWIDs</h3>
    <div id="hwidList" class="grid"></div>
</div>

<script>
// ============================================================
// DATA (stored in localStorage for simplicity)
// ============================================================
function getScripts() {
    return JSON.parse(localStorage.getItem('kp_scripts') || '[]');
}

function setScripts(scripts) {
    localStorage.setItem('kp_scripts', JSON.stringify(scripts));
}

function getKeys() {
    return JSON.parse(localStorage.getItem('kp_keys') || '[]');
}

function setKeys(keys) {
    localStorage.setItem('kp_keys', JSON.stringify(keys));
}

function getBanned() {
    return JSON.parse(localStorage.getItem('kp_banned') || '[]');
}

function setBanned(banned) {
    localStorage.setItem('kp_banned', JSON.stringify(banned));
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function renderScripts() {
    const scripts = getScripts();
    const container = document.getElementById('scriptsList');
    if (!scripts.length) {
        container.innerHTML = '<div style="color:#9ca3af;padding:20px;text-align:center">No scripts yet.</div>';
        return;
    }
    let html = '';
    for (const s of scripts) {
        const statusClass = s.status === 'active' ? 'badge-active' : 'badge-disabled';
        html += `<div class="card">
            <div style="font-weight:600;font-size:15px">${s.name}</div>
            <div style="color:#9ca3af;font-size:12px">ID: ${s.id}</div>
            <div style="margin:8px 0">
                <span class="badge ${statusClass}">${s.status}</span>
                ${s.ffaMode ? '<span class="badge" style="background:rgba(245,158,11,0.15);color:#f59e0b">FFA</span>' : ''}
            </div>
            <div class="loadstring-box" onclick="copyText(this)">loadstring(game:HttpGet("https://kers0neprotector.pages.dev/loader/${s.id}"))()</div>
            <button class="btn-danger" onclick="deleteScript('${s.id}')" style="font-size:12px;padding:6px 12px">Delete</button>
        </div>`;
    }
    container.innerHTML = html;
}

function renderKeys() {
    const keys = getKeys();
    const container = document.getElementById('keysList');
    if (!keys.length) {
        container.innerHTML = '<div style="color:#9ca3af;padding:20px;text-align:center">No keys yet.</div>';
        return;
    }
    let html = '';
    for (const k of keys) {
        html += `<div class="card">
            <div style="font-family:monospace;font-size:13px;color:#6366f1">${k.key}</div>
            <div style="color:#9ca3af;font-size:12px">${k.note || 'No note'}</div>
            <button class="btn-danger" onclick="deleteKey('${k.key}')" style="font-size:12px;padding:6px 12px;margin-top:8px">Delete</button>
        </div>`;
    }
    container.innerHTML = html;
}

function renderBanned() {
    const banned = getBanned();
    const container = document.getElementById('hwidList');
    if (!banned.length) {
        container.innerHTML = '<div style="color:#9ca3af;padding:20px;text-align:center">No banned HWIDs.</div>';
        return;
    }
    let html = '';
    for (const h of banned) {
        html += `<div class="card">
            <div style="font-family:monospace;font-size:13px;color:#ef4444">${h.hwid}</div>
            <button class="btn-outline" onclick="unbanHwid('${h.hwid}')" style="font-size:12px;padding:6px 12px;margin-top:8px">Unban</button>
        </div>`;
    }
    container.innerHTML = html;
}

// ============================================================
// ACTIONS
// ============================================================
async function obfuscateScript() {
    const name = document.getElementById('scriptName').value.trim();
    const code = document.getElementById('scriptInput').value;
    const status = document.getElementById('obfuscateStatus');
    const output = document.getElementById('scriptOutput');
    
    if (!name) { status.textContent = '❌ Enter a script name.'; return; }
    if (!code.trim()) { status.textContent = '❌ Paste a script.'; return; }
    
    status.textContent = '⏳ Obfuscating...';
    
    try {
        const formData = new FormData();
        const blob = new Blob([code], { type: 'text/plain' });
        formData.append('file', blob, 'script.lua');
        formData.append('anti_env_logger', 'true');
        
        const response = await fetch('https://kers0ne-0bf.lovable.app/api/public/obfuscate', {
            method: 'POST',
            headers: { 'X-API-Key': 'kers0neontop123' },
            body: formData
        });
        
        if (!response.ok) throw new Error('Obfuscation failed: ' + response.status);
        
        const result = await response.text();
        output.value = result;
        
        // Save to scripts
        const scripts = getScripts();
        const newScript = {
            id: 'script_' + Math.random().toString(36).substring(2, 10),
            name: name,
            code: result,
            ffaMode: document.getElementById('ffaModeCheck').checked,
            status: 'active'
        };
        scripts.unshift(newScript);
        setScripts(scripts);
        
        status.textContent = '✅ Saved!';
        document.getElementById('scriptName').value = '';
        document.getElementById('scriptInput').value = '';
        renderScripts();
    } catch (e) {
        status.textContent = '❌ Error: ' + e.message;
    }
}

function deleteScript(id) {
    if (!confirm('Delete this script?')) return;
    let scripts = getScripts();
    scripts = scripts.filter(s => s.id !== id);
    setScripts(scripts);
    renderScripts();
}

function generateKey() {
    const durationHours = parseInt(document.getElementById('keyDuration').value) || 0;
    const note = document.getElementById('keyNote').value;
    const key = 'KEY_' + Math.random().toString(36).substring(2, 10).toUpperCase();
    const keys = getKeys();
    keys.push({
        key: key,
        note: note,
        durationHours: durationHours,
        createdAt: Date.now()
    });
    setKeys(keys);
    document.getElementById('keyDuration').value = '';
    document.getElementById('keyNote').value = '';
    renderKeys();
}

function deleteKey(key) {
    if (!confirm('Delete this key?')) return;
    let keys = getKeys();
    keys = keys.filter(k => k.key !== key);
    setKeys(keys);
    renderKeys();
}

function banHwid() {
    const hwid = document.getElementById('banHwidInput').value.trim();
    if (!hwid) return alert('Enter an HWID.');
    const banned = getBanned();
    if (!banned.find(b => b.hwid === hwid)) {
        banned.push({ hwid: hwid });
        setBanned(banned);
    }
    document.getElementById('banHwidInput').value = '';
    renderBanned();
}

function unbanHwid(hwid) {
    if (!confirm('Unban this HWID?')) return;
    let banned = getBanned();
    banned = banned.filter(b => b.hwid !== hwid);
    setBanned(banned);
    renderBanned();
}

function copyText(el) {
    const text = el.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
        el.style.borderColor = '#10b981';
        setTimeout(() => el.style.borderColor = '', 1500);
    });
}

// ============================================================
// NAVIGATION
// ============================================================
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.nav button[onclick*="${viewId}"]`)?.classList.add('active');
}

function logout() {
    localStorage.clear();
    window.location.href = '/';
}

// ============================================================
// AUTH
// ============================================================
function checkLogin() {
    const user = localStorage.getItem('kp_user');
    if (user) {
        document.getElementById('username').textContent = user;
    }
    renderScripts();
    renderKeys();
    renderBanned();
}

checkLogin();
</script>
</body>
</html>
