<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERSFORGE - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(180, 0, 0, 0.12);
            padding: 28px 18px;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar .logo { font-size: 20px; font-weight: 900; margin-bottom: 32px; }
        .sidebar .logo span { color: #cc0000; }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            color: #666;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            border: none;
            background: none;
            font-family: 'Inter', sans-serif;
        }
        .sidebar .nav-item:hover { color: #e0e0e0; background: rgba(255,255,255,0.03); }
        .sidebar .nav-item.active { background: rgba(204, 0, 0, 0.08); color: #cc0000; border-left: 2px solid #cc0000; border-radius: 0 10px 10px 0; }
        .sidebar .bottom { margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
        .main { flex: 1; padding: 28px 32px; overflow-y: auto; max-height: 100vh; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.04); margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .topbar h2 { font-size: 20px; font-weight: 800; }
        .topbar .user { display: flex; align-items: center; gap: 16px; }
        .topbar .user .name { font-weight: 600; font-size: 14px; }
        .topbar .user .logout { color: #666; font-size: 13px; cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; }
        .topbar .user .logout:hover { color: #cc0000; }
        .card {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #ccc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .script-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 18px;
            transition: 0.2s;
        }
        .script-card:hover { border-color: rgba(204, 0, 0, 0.2); transform: translateY(-2px); }
        .script-card .name { font-weight: 600; font-size: 14px; }
        .script-card .id { color: #444; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin: 4px 0 8px; }
        .script-card .badge { font-size: 10px; font-weight: 600; padding: 2px 10px; border-radius: 12px; display: inline-block; margin-right: 4px; }
        .badge-active { background: rgba(0, 200, 100, 0.12); color: #00cc66; }
        .badge-disabled { background: rgba(204, 0, 0, 0.12); color: #cc0000; }
        .loadstring-box {
            background: rgba(0,0,0,0.3);
            border: 1px dashed rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #cc0000;
            word-break: break-all;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.2s;
        }
        .loadstring-box:hover { border-color: #cc0000; background: rgba(204,0,0,0.04); }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: #e0e0e0;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: 0.2s;
        }
        textarea { font-family: 'JetBrains Mono', monospace; resize: vertical; min-height: 100px; font-size: 12px; }
        input:focus, textarea:focus { outline: none; border-color: #cc0000; box-shadow: 0 0 0 3px rgba(204,0,0,0.06); }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #cc0000; color: white; }
        .btn-primary:hover { background: #aa0000; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(204,0,0,0.2); }
        .btn-danger { background: rgba(204, 0, 0, 0.08); color: #cc0000; border: 1px solid rgba(204, 0, 0, 0.08); }
        .btn-danger:hover { background: rgba(204, 0, 0, 0.15); }
        .btn-outline { background: rgba(255,255,255,0.03); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.04); }
        .btn-outline:hover { border-color: #cc0000; color: #cc0000; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .status { margin-top: 10px; font-size: 13px; color: #666; }
        .status.success { color: #00cc66; }
        .status.error { color: #cc0000; }
        .empty-state { color: #444; text-align: center; padding: 40px 20px; font-size: 14px; }
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .upload-area:hover { border-color: #cc0000; background: rgba(204,0,0,0.03); }
        .upload-area .icon { font-size: 32px; display: block; margin-bottom: 8px; }
        .upload-area .text { color: #666; font-size: 13px; }
        .upload-area .subtext { color: #444; font-size: 12px; margin-top: 4px; }
        @media (max-width: 768px) {
            .app { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.04); padding: 16px; }
            .sidebar .logo { margin-bottom: 16px; }
            .sidebar .nav { display: flex; gap: 4px; flex-wrap: wrap; }
            .sidebar .nav-item { padding: 8px 12px; font-size: 12px; }
            .main { padding: 16px; max-height: none; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo">KERS<span>FORGE</span></div>
        <div class="nav">
            <button class="nav-item active" onclick="switchView('view-scripts')">Scripts</button>
            <button class="nav-item" onclick="switchView('view-create')">New Script</button>
            <button class="nav-item" onclick="switchView('view-keys')">Keys</button>
            <button class="nav-item" onclick="switchView('view-hwids')">Bans</button>
        </div>
        <div class="bottom">
            <button class="nav-item" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h2 id="pageTitle">Scripts</h2>
            <div class="user">
                <span class="name" id="username">User</span>
                <button class="logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="view-scripts" class="view active">
            <div class="card">
                <h3>Your Scripts</h3>
                <div id="scriptsList" class="grid"><div class="empty-state">No scripts yet. Create one.</div></div>
            </div>
            <button class="btn btn-primary" onclick="switchView('view-create')">+ New Script</button>
        </div>

        <div id="view-create" class="view">
            <div class="card">
                <h3>Create Script</h3>
                <input type="text" id="scriptName" placeholder="Script Name">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <span class="icon">📁</span>
                    <div class="text">Click or drag to upload your script</div>
                    <div class="subtext">Supports .lua, .txt files</div>
                </div>
                <input type="file" id="fileInput" accept=".lua,.txt" style="display:none" onchange="handleFileUpload(event)">
                <textarea id="scriptInput" rows="6" placeholder="-- Paste your Lua script here..."></textarea>
                <button class="btn btn-primary" onclick="saveScript()">Save Script</button>
                <div id="saveStatus" class="status">Ready</div>
            </div>
            <button class="btn btn-outline" onclick="switchView('view-scripts')">Back to Scripts</button>
        </div>

        <div id="view-keys" class="view">
            <div class="card"><h3>Generate Key</h3>
                <input type="number" id="keyDuration" placeholder="Hours (0 = permanent)">
                <input type="text" id="keyNote" placeholder="Note (optional)">
                <button class="btn btn-primary" onclick="generateKey()">Generate Key</button>
            </div>
            <div class="card"><h3>Your Keys</h3>
                <div id="keysList" class="grid"><div class="empty-state">No keys yet.</div></div>
            </div>
        </div>

        <div id="view-hwids" class="view">
            <div class="card"><h3>Ban HWID</h3>
                <input type="text" id="banHwidInput" placeholder="HWID to ban">
                <button class="btn btn-danger" onclick="banHwid()">Ban</button>
            </div>
            <div class="card"><h3>Banned HWIDs</h3>
                <div id="hwidList" class="grid"><div class="empty-state">No banned HWIDs.</div></div>
            </div>
        </div>
    </div>
</div>

<script>
function getSession() {
    try { return JSON.parse(localStorage.getItem('kf_session')); } catch { return null; }
}

function getData(key) {
    try { return JSON.parse(localStorage.getItem('kf_' + key) || '[]'); } catch { return []; }
}
function setData(key, data) { localStorage.setItem('kf_' + key, JSON.stringify(data)); }

function getScripts() { return getData('scripts'); }
function setScripts(s) { setData('scripts', s); }
function getKeys() { return getData('keys'); }
function setKeys(k) { setData('keys', k); }
function getBanned() { return getData('banned'); }
function setBanned(b) { setData('banned', b); }

function checkLogin() {
    const session = getSession();
    if (!session) { window.location.href = '/'; return; }
    document.getElementById('username').textContent = session.username || 'User';
    renderScripts();
    renderKeys();
    renderBanned();
}

function logout() {
    localStorage.removeItem('kf_session');
    window.location.href = '/';
}

function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const titles = { 'view-scripts': 'Scripts', 'view-create': 'New Script', 'view-keys': 'Keys', 'view-hwids': 'Bans' };
    document.getElementById('pageTitle').textContent = titles[viewId] || 'Dashboard';
    const navMap = { 'view-scripts': 0, 'view-create': 1, 'view-keys': 2, 'view-hwids': 3 };
    const items = document.querySelectorAll('.nav-item');
    items.forEach((n, i) => n.classList.toggle('active', i === navMap[viewId]));
}

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('scriptInput').value = e.target.result;
        if (!document.getElementById('scriptName').value) {
            document.getElementById('scriptName').value = file.name.replace(/\.[^/.]+$/, '');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('scriptInput').value = ev.target.result;
            if (!document.getElementById('scriptName').value) {
                document.getElementById('scriptName').value = file.name.replace(/\.[^/.]+$/, '');
            }
        };
        reader.readAsText(file);
    }
});

function renderScripts() {
    const scripts = getScripts();
    const container = document.getElementById('scriptsList');
    if (!scripts.length) {
        container.innerHTML = '<div class="empty-state">No scripts yet. Create one.</div>';
        return;
    }
    let html = '';
    for (const s of scripts) {
        const statusClass = s.status === 'active' ? 'badge-active' : 'badge-disabled';
        html += `<div class="script-card">
            <div class="name">${s.name}</div>
            <div class="id">ID: ${s.id}</div>
            <div style="margin: 6px 0;">
                <span class="badge ${statusClass}">${s.status}</span>
            </div>
            <div class="loadstring-box" onclick="copyText(this)">loadstring(game:HttpGet("https://kers0neprotector.pages.dev/api/public/loaders/${s.id}/lua"))()</div>
            <div class="flex">
                <button class="btn btn-danger" onclick="deleteScript('${s.id}')" style="font-size:11px;padding:4px 12px;">Delete</button>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

function renderKeys() {
    const keys = getKeys();
    const container = document.getElementById('keysList');
    if (!keys.length) {
        container.innerHTML = '<div class="empty-state">No keys yet.</div>';
        return;
    }
    let html = '';
    for (const k of keys) {
        html += `<div class="script-card">
            <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#cc0000;font-weight:700;">${k.key}</div>
            <div style="color:#666;font-size:12px;">${k.note || 'No note'}</div>
            <div style="color:#666;font-size:12px;">${k.durationHours ? k.durationHours + 'h' : 'Permanent'}</div>
            <button class="btn btn-danger" onclick="deleteKey('${k.key}')" style="font-size:11px;padding:4px 12px;margin-top:6px;">Delete</button>
        </div>`;
    }
    container.innerHTML = html;
}

function renderBanned() {
    const banned = getBanned();
    const container = document.getElementById('hwidList');
    if (!banned.length) {
        container.innerHTML = '<div class="empty-state">No banned HWIDs.</div>';
        return;
    }
    let html = '';
    for (const h of banned) {
        html += `<div class="script-card">
            <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#cc0000;font-weight:700;">${h.hwid}</div>
            <button class="btn btn-outline" onclick="unbanHwid('${h.hwid}')" style="font-size:11px;padding:4px 12px;margin-top:6px;">Unban</button>
        </div>`;
    }
    container.innerHTML = html;
}

async function saveScript() {
    const name = document.getElementById('scriptName').value.trim();
    const code = document.getElementById('scriptInput').value;
    const status = document.getElementById('saveStatus');
    
    if (!name) { status.textContent = 'Enter a script name.'; status.className = 'status error'; return; }
    if (!code.trim()) { status.textContent = 'Paste or upload a script.'; status.className = 'status error'; return; }
    
    status.textContent = 'Saving...';
    status.className = 'status';
    
    try {
        const response = await fetch('/api/scripts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, code })
        });
        const data = await response.json();
        
        if (!data.success) throw new Error(data.error || 'Failed to save script');
        
        const scripts = getScripts();
        scripts.unshift({
            id: data.id,
            name: name,
            code: code,
            status: 'active',
            created: Date.now()
        });
        setScripts(scripts);
        
        status.textContent = 'Script saved successfully!';
        status.className = 'status success';
        document.getElementById('scriptName').value = '';
        document.getElementById('scriptInput').value = '';
        renderScripts();
        switchView('view-scripts');
    } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.className = 'status error';
    }
}

function deleteScript(id) {
    if (!confirm('Delete this script?')) return;
    let scripts = getScripts();
    scripts = scripts.filter(s => s.id !== id);
    setScripts(scripts);
    renderScripts();
}

function generateKey() {
    const durationHours = parseInt(document.getElementById('keyDuration').value) || 0;
    const note = document.getElementById('keyNote').value.trim();
    const key = 'KF-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    const keys = getKeys();
    keys.push({ key, note, durationHours, created: Date.now() });
    setKeys(keys);
    document.getElementById('keyDuration').value = '';
    document.getElementById('keyNote').value = '';
    renderKeys();
}

function deleteKey(key) {
    if (!confirm('Delete this key?')) return;
    let keys = getKeys();
    keys = keys.filter(k => k.key !== key);
    setKeys(keys);
    renderKeys();
}

function banHwid() {
    const hwid = document.getElementById('banHwidInput').value.trim();
    if (!hwid) return alert('Enter an HWID to ban.');
    const banned = getBanned();
    if (!banned.find(b => b.hwid === hwid)) {
        banned.push({ hwid, bannedAt: Date.now() });
        setBanned(banned);
    }
    document.getElementById('banHwidInput').value = '';
    renderBanned();
}

function unbanHwid(hwid) {
    if (!confirm('Unban this HWID?')) return;
    let banned = getBanned();
    banned = banned.filter(b => b.hwid !== hwid);
    setBanned(banned);
    renderBanned();
}

function copyText(el) {
    const text = el.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
        el.style.borderColor = '#00cc66';
        setTimeout(() => el.style.borderColor = '', 1500);
    }).catch(() => {
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
    });
}

checkLogin();
</script>
</body>
</html>
